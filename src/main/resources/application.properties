spring.application.name=sample_backend

spring.datasource.url=jdbc:mysql://localhost:3306/training_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo
# 限定権限ユーザー名とパスワード
spring.datasource.username=training_user
spring.datasource.password=training_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# テーブルを自動生成してくれる
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
